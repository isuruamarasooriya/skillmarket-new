name: Deploy Skill Market with Jest Testing

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Jest Tests
        run: |
          cd backend
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t $ECR_REGISTRY/skill-market-frontend:latest ./frontend
          docker push $ECR_REGISTRY/skill-market-frontend:latest
          
          docker build -t $ECR_REGISTRY/skill-market-backend:latest ./backend
          docker push $ECR_REGISTRY/skill-market-backend:latest

      - name: SSH into EC2 and Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop frontend backend || true
            sudo docker rm frontend backend || true
            
            sudo kubectl rollout restart deployment frontend-deployment || true
            sudo kubectl rollout restart deployment backend-deployment || true