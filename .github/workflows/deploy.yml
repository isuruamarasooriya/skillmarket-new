name: Deploy Skill Market with Jest Testing

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Jest Tests
        run: |
          cd backend
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --build-arg REACT_APP_API_URL=http://${{ secrets.EC2_HOST }}:5000 -t $ECR_REGISTRY/skill-market-frontend:latest ./frontend
          docker push $ECR_REGISTRY/skill-market-frontend:latest
          
          docker build -t $ECR_REGISTRY/skill-market-backend:latest ./backend
          docker push $ECR_REGISTRY/skill-market-backend:latest

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin 802104113126.dkr.ecr.ap-south-1.amazonaws.com
            
            sudo docker stop frontend backend || true
            sudo docker rm frontend backend || true
            
            sudo docker pull 802104113126.dkr.ecr.ap-south-1.amazonaws.com/skill-market-frontend:latest
            sudo docker pull 802104113126.dkr.ecr.ap-south-1.amazonaws.com/skill-market-backend:latest
            
            sudo docker run -d --name backend -p 5000:5000 802104113126.dkr.ecr.ap-south-1.amazonaws.com/skill-market-backend:latest
            sudo docker run -d --name frontend -p 3000:3000 802104113126.dkr.ecr.ap-south-1.amazonaws.com/skill-market-frontend:latest
            
            sudo docker image prune -f